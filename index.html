<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tattoo Aftercare</title>
  <style>
    /* ── Base ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #ffffff;
    }

    /* ── Card wrapper ───────────────────────────────────── */
    .card {
      background: #000000;
      border-radius: 2rem;
      max-width: 420px;
      width: 100%;
      padding: 2.5rem 2rem 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,.7), 0 4px 12px rgba(0,0,0,.5);
      position: relative;
      border: 1px solid rgba(255,255,255,.15);
    }

    /* inner border */
    .card::before {
      content: '';
      position: absolute;
      inset: 8px;
      border: 1.5px solid rgba(255,255,255,.08);
      border-radius: 1.6rem;
      pointer-events: none;
    }

    /* ── Title ──────────────────────────────────────────── */
    h1 {
      font-family: 'Segoe Print', 'Comic Sans MS', cursive;
      font-size: clamp(1.7rem, 6vw, 2.2rem);
      font-weight: 400;
      text-align: center;
      color: #ffffff;
      margin-bottom: 2rem;
      letter-spacing: .02em;
      line-height: 1.2;
    }

    /* ── Step list ──────────────────────────────────────── */
    .steps {
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .icon-wrap {
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-wrap svg {
      width: 100%;
      height: 100%;
      stroke: #ffffff;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .step-text {
      font-size: clamp(.95rem, 4vw, 1.1rem);
      line-height: 1.5;
      color: #ffffff;
    }

    .step-text a {
      color: #ffffff;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,.4);
    }

    .step-text a:hover { border-bottom-color: #ffffff; }

    /* ── Responsive tweaks ──────────────────────────────── */
    @media (max-width: 360px) {
      .card { padding: 2rem 1.2rem 1.6rem; }
      .icon-wrap { width: 46px; height: 46px; }
    }
  </style>
</head>
<body>

<div class="card">
  <h1>tattoo aftercare</h1>

  <div class="steps">

    <!-- 1 · Folie -->
    <div class="step">
      <div class="icon-wrap">
        <svg viewBox="0 0 48 48" aria-hidden="true">
          <!-- bandage / plaster shape -->
          <rect x="5" y="16" width="38" height="16" rx="8"/>
          <!-- center pad -->
          <rect x="17" y="16" width="14" height="16" rx="1.5"/>
          <!-- cross on pad -->
          <line x1="24" y1="19.5" x2="24" y2="28.5"/>
          <line x1="20.5" y1="24" x2="27.5" y2="24"/>
        </svg>
      </div>
      <p class="step-text"><strong>Folie</strong> 3–5 Tage drauflassen</p>
    </div>

    <!-- 2 · Seife -->
    <div class="step">
      <div class="icon-wrap">
        <svg viewBox="0 0 48 48" aria-hidden="true">
          <!-- bottle body -->
          <rect x="14" y="18" width="20" height="26" rx="4"/>
          <!-- pump neck -->
          <rect x="21" y="10" width="6"  height="10" rx="2"/>
          <!-- pump head -->
          <rect x="16" y="7"  width="16" height="5"  rx="2"/>
          <!-- nozzle -->
          <line x1="32" y1="9.5" x2="38" y2="9.5"/>
          <line x1="38" y1="9.5" x2="38" y2="14"/>
        </svg>
      </div>
      <p class="step-text">mit <strong>pH-milder Seife</strong> abwaschen</p>
    </div>

    <!-- 3 · Küchenpapier -->
    <div class="step">
      <div class="icon-wrap">
        <svg viewBox="0 0 48 48" aria-hidden="true">
          <!-- paper sheet -->
          <rect x="11" y="6" width="22" height="30" rx="3"/>
          <!-- lines suggesting paper texture -->
          <line x1="17" y1="14" x2="27" y2="14"/>
          <line x1="17" y1="20" x2="27" y2="20"/>
          <line x1="17" y1="26" x2="23" y2="26"/>
          <!-- droplet being dabbed away -->
          <path d="M34 28 Q34 24 37 22 Q40 24 40 28 Q40 32 37 32 Q34 32 34 28 Z"/>
        </svg>
      </div>
      <p class="step-text">mit <strong>Küchenpapier</strong> trocken tupfen</p>
    </div>

    <!-- 4 · Tattoocreme -->
    <div class="step">
      <div class="icon-wrap">
        <svg viewBox="0 0 48 48" aria-hidden="true">
          <!-- jar body -->
          <rect x="10" y="22" width="28" height="20" rx="3"/>
          <!-- jar lid -->
          <rect x="8"  y="16" width="32" height="8"  rx="3"/>
          <!-- cream swirl -->
          <path d="M24 16 C24 12 20 10 24 8 C28 6 28 10 24 10"/>
        </svg>
      </div>
      <p class="step-text">einmal täglich mit <strong>Tattoocreme</strong> eincremen für 10 Tage<br>
        <a href="https://amzn.eu/d/059P8Q77" target="_blank" rel="noopener">Empfehlung ansehen →</a></p>
    </div>

    <!-- 5 · Nicht kratzen -->
    <div class="step">
      <div class="icon-wrap">
        <svg viewBox="0 0 48 48" aria-hidden="true">
          <!-- hand outline -->
          <path d="M20 36 C20 36 12 28 12 20 C12 16 15 14 18 16
                   L18 10 C18 8 20 7 22 8 L22 8
                   C22 6 24 5 26 7
                   C26 5 28 5 29 7
                   C30 6 32 7 32 10
                   L32 22 C34 20 37 21 37 24 C37 29 34 33 30 36 Z"/>
          <!-- prohibition cross -->
          <line x1="10" y1="38" x2="18" y2="30"/>
          <line x1="18" y1="38" x2="10" y2="30"/>
        </svg>
      </div>
      <p class="step-text">nicht <strong>kratzen</strong></p>
    </div>

    <!-- 6 · Sonne vermeiden -->
    <div class="step">
      <div class="icon-wrap">
        <svg viewBox="0 0 48 48" aria-hidden="true">
          <!-- sun circle -->
          <circle cx="24" cy="24" r="9"/>
          <!-- rays -->
          <line x1="24" y1="4"  x2="24" y2="10"/>
          <line x1="24" y1="38" x2="24" y2="44"/>
          <line x1="4"  y1="24" x2="10" y2="24"/>
          <line x1="38" y1="24" x2="44" y2="24"/>
          <line x1="9.5"  y1="9.5"  x2="13.8" y2="13.8"/>
          <line x1="34.2" y1="34.2" x2="38.5" y2="38.5"/>
          <line x1="38.5" y1="9.5"  x2="34.2" y2="13.8"/>
          <line x1="13.8" y1="34.2" x2="9.5"  y2="38.5"/>
        </svg>
      </div>
      <p class="step-text"><strong>2–4 Wochen</strong> Sonne vermeiden</p>
    </div>

    <!-- 7 · Kein Schwimmen / Sauna -->
    <div class="step">
      <div class="icon-wrap">
        <svg viewBox="0 0 48 48" aria-hidden="true">
          <!-- water drops -->
          <path d="M16 14 Q16 8 20 8 Q24 8 24 14 Q24 20 20 20 Q16 20 16 14 Z"/>
          <path d="M23 22 Q23 16 27 16 Q31 16 31 22 Q31 28 27 28 Q23 28 23 22 Z"/>
          <path d="M10 26 Q10 20 14 20 Q18 20 18 26 Q18 32 14 32 Q10 32 10 26 Z"/>
          <!-- prohibition cross -->
          <line x1="33" y1="36" x2="41" y2="44"/>
          <line x1="41" y1="36" x2="33" y2="44"/>
        </svg>
      </div>
      <p class="step-text">kein <strong>Schwimmen</strong> oder Sauna</p>
    </div>

    <!-- 8 · WhatsApp -->
    <div class="step">
      <div class="icon-wrap">
        <svg viewBox="0 0 48 48" aria-hidden="true">
          <!-- chat bubble outline -->
          <path d="M24 6 C13.5 6 5 13.5 5 22.8 C5 27.6 7.4 31.9 11.2 34.8 L9.5 42 L17.5 39.2 C19.5 39.8 21.7 40.2 24 40.2 C34.5 40.2 43 32.7 43 22.8 C43 13.5 34.5 6 24 6 Z"/>
          <!-- phone handset inside -->
          <path d="M17 18 C17 17 18.5 15.5 20 16.5 L22 19.5 L20 21.5 C21.2 23.5 24.5 26.5 26.5 27.5 L28.5 25.5 L31.5 27.5 C32.5 29 31 30.5 30 30.5 C25 31 17 23 17 18 Z" stroke="#000000" stroke-width="1.2"/>
        </svg>
      </div>
      <p class="step-text">Bei Rückfragen: <a href="https://wa.me/491633844923" target="_blank" rel="noopener"><strong>WhatsApp</strong></a></p>
    </div>

  </div><!-- .steps -->
</div><!-- .card -->

</body>
</html>
